<html>
<head>
    <title>Menu - Table {{ table_id }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff8f0; }
        
        .header { 
            background: linear-gradient(135deg, #ff6b35, #f7931e); 
            color: white; padding: 20px; text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .logo { font-size: 40px; margin-bottom: 5px; }
        .header h1 { font-size: 32px; font-weight: 800; letter-spacing: 1px; }
        .header p { opacity: 0.9; font-size: 14px; }
        
        .cart-float {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: #28a745; color: white; padding: 12px 18px;
            border-radius: 50px; text-decoration: none; font-weight: bold;
            box-shadow: 0 4px 15px rgba(40,167,69,0.4);
        }
        
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        
        .search-box { margin: 20px 0; }
        .search-box input {
            width: 100%; padding: 15px; font-size: 16px;
            border: 2px solid #ddd; border-radius: 50px; outline: none;
        }
        .search-box input:focus { border-color: #ff6b35; }
        
        .category-box { display: flex; gap: 15px; margin: 20px 0; }
        .category-card {
            flex: 1; padding: 20px; border-radius: 15px; text-align: center;
            cursor: pointer; transition: 0.3s; color: white; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .category-card:hover { transform: translateY(-5px); }
        .veg-card { background: linear-gradient(135deg, #4CAF50, #2E7D32); }
        .nonveg-card { background: linear-gradient(135deg, #F44336, #C62828); }
        .category-card img { width: 60px; height: 60px; margin-bottom: 10px; }
        .active-cat { transform: scale(1.05); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        
        .food-list { margin-top: 10px; }
        .food-item {
            background: white; margin: 12px 0; padding: 15px; border-radius: 12px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: 0.2s;
        }
        .food-item:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .food-left { display: flex; align-items: center; gap: 15px; }
        .food-icon { font-size: 35px; }
        .food-name { font-size: 18px; font-weight: 600; color: #333; }
        .food-price { color: #ff6b35; font-weight: bold; font-size: 16px; }
        .add-btn {
            background: #007bff; color: white; padding: 10px 18px;
            border: none; border-radius: 8px; text-decoration: none; font-weight: bold;
        }
        .add-btn:active { transform: scale(0.95); }
        .hidden { display: none; }
        
        .pdf-btn {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #6c757d; color: white; padding: 12px 25px;
            border-radius: 50px; text-decoration: none; font-weight: bold;
        }
       .cancel-btn {
    background: #dc3545;
    color: white;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
}

.cancel-btn:hover {
    background: #c82333;
}

.cancel-btn:hover {
    background: #c82333;
}
    </style>
</head>
<body>
    <a href="/cart" class="cart-float">🛒 Cart</a>
    
    <div class="header">
        <div class="logo">️</div>
        <h1>HOTEL TAJ</h1>
        <p>Table {{ table_id }} | Welcome!</p>
    </div>

    <div class="container">
        <!-- Search Bar -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder=" Search food... Vadapav, Biryani...">
        </div>

        <!-- Category Cards -->
        <div class="category-box">
            <div class="category-card veg-card active-cat" onclick="filterCategory('veg', event)">
                <div style="font-size: 50px;">🥗</div>
                <div>VEG</div>
            </div>
            <div class="category-card nonveg-card" onclick="filterCategory('non-veg', event)">
                <div style="font-size: 50px;"></div>
                <div>NON-VEG</div>
            </div>
        </div>

        <!-- Food List -->
        <div class="food-list" id="foodList">
            {% for item in menu_items %}
            <div class="food-item" data-name="{{ item.name.lower() }}" data-category="{{ item.category }}">
                <div class="food-left">
                    <div class="food-icon">{{ item.icon }}</div>
                    <div>
                        <div class="food-name">{{ item.name }}</div>
                        <div class="food-price">₹{{ item.price }}</div>
                    </div>
                </div>
               <div style="display:flex; gap:8px;">
    <a href="/add_to_cart/{{ item.id }}" class="add-btn">+ Add</a>

    <a href="/cancel_item/{{ item.id }}"
       class="cancel-btn"
       onclick="return confirm('Ha item cancel karaycha aahe ka?');">
       ❌ Cancel
    </a>
</div>
            </div>
            {% endfor %}
        </div>
    </div>

    <a href="javascript:window.print()" class="pdf-btn"> Download Menu PDF</a>

<script>
    // Search Function
    document.getElementById('searchInput').addEventListener('keyup', function() {
        let filter = this.value.toLowerCase();
        let items = document.querySelectorAll('.food-item');
        items.forEach(item => {
            let name = item.getAttribute('data-name');
            if (name.includes(filter)) {
                item.classList.remove('hidden');
            } else {
                item.classList.add('hidden');
            }
        });
    });

    // Category Filter - fakt 'event' add kela
    function filterCategory(cat, event) {
        document.querySelectorAll('.category-card').forEach(c => c.classList.remove('active-cat'));
        event.currentTarget.classList.add('active-cat');
        
        let items = document.querySelectorAll('.food-item');
        items.forEach(item => {
            if (item.getAttribute('data-category') === cat) {
                item.classList.remove('hidden');
            } else {
                item.classList.add('hidden');
            }
        });
        document.getElementById('searchInput').value = '';
    }

    // Page load la Veg ch dakhav
    window.onload = () => filterCategory('veg', {currentTarget: document.querySelector('.veg-card')});
</script>

</body>
</html>
