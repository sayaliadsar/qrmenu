<html>
<head>
    <title>Table {{ table_id }} QR Code</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
        .qr-box { 
            background: white; padding: 30px; border-radius: 15px; 
            display: inline-block; box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin: 20px auto; max-width: 90%;
        }
        img { width: 280px; height: 280px; border: 3px solid #333; }
        h1 { color: #ff6b35; margin-bottom: 10px; }
        .link { margin: 20px 0; font-size: 14px; word-break: break-all; background: #f8f8f8; padding: 10px; border-radius: 5px; }
        .back-btn, .test-btn {
            display: inline-block; margin: 10px 5px; padding: 12px 25px;
            color: white; text-decoration: none; border-radius: 8px; font-weight: bold;
        }
        .back-btn { background: #007bff; }
        .test-btn { background: #28a745; }
        .tag { background: #28a745; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; display: inline-block; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>Table {{ table_id }}  QR Code</h1>
    
    
    <div class="qr-box">
        <!-- Offline QR Ithe Disel -->
        <img src="{{ qr_image }}" alt="QR Code">
        
        <div class="link">
            <b>Menu Link:</b><br>
            <a href="{{ menu_url }}" target="_blank">{{ menu_url }}</a>
        </div>
        
        <a href="{{ menu_url }}" class="test-btn" target="_blank">✅ check the Menu</a>
    </div>
    
    <br>
    <a href="/dashboard" class="back-btn">← Back to Dashboard</a>


    <!-- 🔒 छुपं अ‍ॅडमिन लॉगिन बटण (Hidden Admin Link) -->
<div style="text-align: center; margin-top: 60px; padding-bottom: 40px;">
    <a href="/admin" style="color: #ecd5bc; text-decoration: none; font-size: 11px; letter-spacing: 0.5px; cursor: default;">
        🔒 admin Login 
    </a>
</div>

</body>
</html>
